<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support — SolSolum Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" />
  <link rel="icon" type="image/png" href="assets/logo_simple1.png" sizes="32x32" />
  <style>
    :root {
      --bg: #f7eee9;
      --card: #fffaf7;
      --text: #2d2e32;
      --muted: #6f6661;
      --accent: #f4a7bd;
      --line: rgba(45, 46, 50, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      width: min(800px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo { height: 48px; width: auto; }

    .studio-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }

    .lang-btn {
      background: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-family: inherit;
      color: var(--muted);
      cursor: pointer;
      margin-left: auto;
    }

    .lang-btn:hover { color: var(--text); }

    main {
      flex: 1;
      width: min(800px, calc(100% - 40px));
      margin: 0 auto;
      padding: 48px 0 80px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .back:hover { color: var(--text); }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 16px;
    }

    p { color: var(--muted); margin-bottom: 16px; }

    .contact-card {
      margin-top: 40px;
      background: var(--card);
      border-radius: 16px;
      padding: 36px;
      display: inline-block;
    }

    .contact-card p {
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .contact-card a {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }

    .contact-card a:hover { text-decoration: underline; }

    footer {
      width: min(800px, calc(100% - 40px));
      margin: 0 auto;
      padding: 24px 0;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--muted);
    }

    footer a { color: var(--text); text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <img class="logo" src="assets/logo_simple1.png" alt="SolSolum Studio" />
      <a class="studio-name" href="/">SolSolum Studio</a>
      <button class="lang-btn" id="lang-toggle" onclick="toggleLang()">한국어</button>
    </header>

    <main>
      <a class="back" href="index.html" data-i18n="back">&#8592; Back</a>
      <h1 data-i18n="page-title">Support</h1>
      <p data-i18n="p-intro-1">Have a question or running into an issue with DebutK: K-POP ME!? We'd love to help.</p>
      <p data-i18n="p-intro-2">Send us an email and we'll get back to you as soon as we can.</p>

      <div class="contact-card">
        <p data-i18n="p-email-label">Email us at</p>
        <a href="mailto:hello@solsolum.studio">hello@solsolum.studio</a>
      </div>
    </main>

    <footer>
      <span data-i18n="footer-copy">© 2026 SolSolum LLC. All rights reserved.</span>
      <span><a href="mailto:hello@solsolum.studio">hello@solsolum.studio</a></span>
    </footer>
  </div>

  <script>
    const translations = {
      en: {
        'back': '← Back',
        'page-title': 'Support',
        'p-intro-1': "Have a question or running into an issue with DebutK: K-POP ME!? We'd love to help.",
        'p-intro-2': "Send us an email and we'll get back to you as soon as we can.",
        'p-email-label': 'Email us at',
        'footer-copy': '© 2026 SolSolum LLC. All rights reserved.',
      },
      ko: {
        'back': '← 뒤로',
        'page-title': '고객지원',
        'p-intro-1': 'DebutK: K-POP ME!에 대해 궁금한 점이나 문제가 있으신가요? 기꺼이 도와드리겠습니다.',
        'p-intro-2': '이메일을 보내주시면 최대한 빠르게 답변드리겠습니다.',
        'p-email-label': '이메일 문의',
        'footer-copy': '© 2026 SolSolum LLC. 모든 권리 보유.',
      }
    };

    let currentLang = localStorage.getItem('lang') || 'en';

    function applyLang(lang) {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang][key]) el.textContent = translations[lang][key];
      });
      document.getElementById('lang-toggle').textContent = lang === 'en' ? '한국어' : 'English';
      document.documentElement.lang = lang === 'en' ? 'en' : 'ko';
      localStorage.setItem('lang', lang);
      currentLang = lang;
    }

    function toggleLang() {
      applyLang(currentLang === 'en' ? 'ko' : 'en');
    }

    applyLang(currentLang);
  </script>
</body>
</html>
