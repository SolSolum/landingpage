<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support — SolSolum Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" />
  <link rel="icon" type="image/png" href="assets/logo_simple1.png" sizes="32x32" />
  <style>
    :root {
      --bg: #f7eee9;
      --card: #fffaf7;
      --text: #2d2e32;
      --muted: #6f6661;
      --accent: #f4a7bd;
      --line: rgba(45, 46, 50, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      width: min(800px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo { height: 48px; width: auto; }

    .studio-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }

    main {
      flex: 1;
      width: min(800px, calc(100% - 40px));
      margin: 0 auto;
      padding: 48px 0 80px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .back:hover { color: var(--text); }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 16px;
    }

    p { color: var(--muted); margin-bottom: 16px; }

    .contact-card {
      margin-top: 40px;
      background: var(--card);
      border-radius: 16px;
      padding: 36px;
      display: inline-block;
    }

    .contact-card p {
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .contact-card a {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }

    .contact-card a:hover { text-decoration: underline; }

    footer {
      width: min(800px, calc(100% - 40px));
      margin: 0 auto;
      padding: 24px 0;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--muted);
    }

    footer a { color: var(--text); text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <img class="logo" src="assets/logo_simple1.png" alt="SolSolum Studio" />
      <a class="studio-name" href="/">SolSolum Studio</a>
    </header>

    <main>
      <a class="back" href="index.html">&#8592; Back</a>
      <h1>Support</h1>
      <p>Have a question or running into an issue with DebutK: K-POP ME!? We'd love to help.</p>
      <p>Send us an email and we'll get back to you as soon as we can.</p>

      <div class="contact-card">
        <p>Email us at</p>
        <a href="mailto:hello@solsolum.studio">hello@solsolum.studio</a>
      </div>
    </main>

    <footer>
      <span>© 2026 SolSolum LLC. All rights reserved.</span>
      <span><a href="mailto:hello@solsolum.studio">hello@solsolum.studio</a></span>
    </footer>
  </div>
</body>
</html>
